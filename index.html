  <style>
    :root {
      --bg: #0d0f1a;
      --bg-card: #141626;
      --bg-secondary: #1e2036;
      --bg-muted: #1a1c30;
      --text: #ececec;
      --text-muted: #8b8b8b;
      --accent: #22c594;
      --accent-dim: rgba(34, 197, 148, 0.12);
      --border: #23253c;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Nav */
    nav {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13, 15, 26, 0.9);
      backdrop-filter: blur(12px);
      z-index: 10;
    }
    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo svg { width: 24px; height: 24px; color: var(--accent); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .lang-switcher {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .lang-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .lang-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(34, 197, 148, 0.3);
    }
    .nav-cta {
      background: var(--accent);
      color: var(--bg);
      padding: 8px 20px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: #1eb385; }

    /* Hero */
    .hero {
      padding: 96px 0 80px;
      text-align: center;
    }
    .hero-badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 24px;
      border: 1px solid rgba(34, 197, 148, 0.2);
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.025em;
    }
    .hero h1 .highlight { color: var(--accent); }
    .hero .slogan {
      font-size: 1.15rem;
      color: var(--text-muted);
      max-width: 580px;
      margin: 0 auto 12px;
      line-height: 1.6;
      font-weight: 500;
    }
    .hero .sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 520px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }
    .hero-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: var(--bg);
      padding: 12px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #1eb385; }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-secondary);
      color: var(--text);
      padding: 12px 28px;
      border-radius: var(--radius);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: var(--bg-muted); }
    .arrow-icon { width: 16px; height: 16px; }

    /* Sections */
    section { padding: 80px 0; }
    .section-border { border-top: 1px solid var(--border); }
    .section-label {
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    section h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    section .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      max-width: 520px;
      margin-bottom: 40px;
    }

    /* Steps */
    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .step {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }
    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.85rem;
      margin-bottom: 14px;
      border: 1px solid rgba(34, 197, 148, 0.2);
    }
    .step h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 8px; }
    .step p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }

    /* Features */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .feature {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .feature-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius);
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      color: var(--accent);
    }
    .feature-icon svg { width: 20px; height: 20px; }
    .feature h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 6px; }
    .feature p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }

    /* Stats */
    .proof { text-align: center; }
    .stats {
      display: flex;
      justify-content: center;
      gap: 56px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .stat {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 36px;
      min-width: 160px;
    }
    .stat-value { font-size: 2rem; font-weight: 800; color: var(--accent); }
    .stat-label { color: var(--text-muted); font-size: 0.8rem; font-weight: 500; margin-top: 4px; }

    /* CTA */
    .final-cta { text-align: center; padding: 96px 0; }
    .final-cta h2 { font-size: 2rem; font-weight: 800; }
    .final-cta p { color: var(--text-muted); font-size: 1rem; margin-bottom: 32px; }

    /* Footer */
    footer {
      padding: 28px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .footer-links {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }
    footer a:hover { color: var(--text); }

    @media (max-width: 768px) {
      .hero { padding: 60px 0 50px; }
      .steps, .feature-grid { grid-template-columns: 1fr; }
      .stats { gap: 16px; }
      .stat { min-width: 140px; padding: 20px 24px; }
      .nav-links { display: none; }
      section { padding: 56px 0; }
    }
  </style>
</head>

    function detectLang() {
      var stored = localStorage.getItem("lang");
      if (stored && T[stored]) return stored;
      var nav = (navigator.language || "en").slice(0, 2).toLowerCase();
      return T[nav] ? nav : "en";
    }

    function setLang(lang) {
      localStorage.setItem("lang", lang);
      document.documentElement.lang = lang;
      var strings = T[lang];

      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        el.textContent = strings[el.dataset.i18n] || "";
      });
      document.querySelectorAll("[data-i18n-html]").forEach(function (el) {
        el.innerHTML = strings[el.dataset.i18nHtml] || "";
      });

      document.querySelectorAll(".lang-btn").forEach(function (btn) {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });

      document.title = "Timberly — " + strings.hero_slogan.slice(0, 60);
      var desc = document.querySelector('meta[name="description"]');
      if (desc) desc.content = strings.hero_slogan;
    }

    document.querySelectorAll(".lang-btn").forEach(function (btn) {
      btn.addEventListener("click", function () { setLang(btn.dataset.lang); });
    });

    setLang(detectLang());
  </script>
